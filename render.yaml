services:
  - type: web
    name: engram-backend
    runtime: python
    rootDirectory: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./engram.db
      - key: FRONTEND_URL
        value: https://your-app.netlify.app
